name: Auth CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  auth-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Backend lint
        run: npm run lint
        working-directory: backend

      - name: Backend tests
        run: npm test
        working-directory: backend

      - name: Backend health/build check
        run: npm run check
        working-directory: backend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend tests
        run: npm test
        working-directory: frontend

      - name: Frontend build
        run: npm run build
        working-directory: frontend

