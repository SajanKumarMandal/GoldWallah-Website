services:
  redis:
    image: redis:7.4-alpine
    container_name: goldwallah-redis
    command:
      - sh
      - -c
      - redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${GOLDWALLAH_REDIS_PASSWORD:-goldwallah-local-redis-change-me}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - goldwallah_redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  goldwallah_redis_data:
